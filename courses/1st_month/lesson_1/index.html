<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Lesson1</title>
</head>

<body>

    <!-- h1-6 - heading — заголовок -->
    <h1 class="text">
        hello world!
    </h1>
    <h2 class="text">
        hello world!
    </h2>
    <h3 class="text">
        hello world!
    </h3>
    <h4 class="text">
        hello world!
    </h4>
    <h5 class="text">
        hello world!
    </h5>
    <h6 class="text">
        hello world!
    </h6>

    <!-- p - paragraph -->
    <p>Lorem, ipsum dolor.</p>

    <!-- a - anchor -->
    <a href="">Lorem, ipsum.</a>
    <a href="">Lorem, ipsum.</a>
    <a href="">Lorem, ipsum.</a>

    <!-- <ul> - unordered list — неупорядоченный список -->
    <!-- <li> - list item — пункт списка -->
    <ul>
        <li>Lorem.</li>
        <li>Omnis?</li>
        <li>Deserunt!</li>
        <li>Consectetur.</li>
        <li>Ipsum?</li>
    </ul>

    <!-- <ol> - ordered list упорядоченный или нумерованный список -->
    <ol>
        <li>Lorem.</li>
        <li>Id?</li>
        <li>Vero.</li>
        <li>Dignissimos?</li>
        <li>Modi!</li>
    </ol>

    <img src="https://chandra.si.edu/photo/2009/galactic/galactic_labeled_525.jpg" alt="background image">
</body>

</html>
